<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <div class="logo"><a href="{{ '/' | relative_url }}">ITroyas</a></div>
    <nav class="menu">
      <a href="{{ '/' | relative_url }}">Главная</a>
      <a href="{{ '/blog/' | relative_url }}">Блог</a>
      <a href="{{ '/categories/' | relative_url }}">Категории</a>
      <a href="https://t.me/itroyas">Telegram</a>
    </nav>
    <div class="burger">&#9776;</div>
  </header>

  <div class="container">
    <main class="content">
      {{ content }}
    </main>
  </div>

  <footer>
    <div class="footer-info">2025 © ITroyas</div>
  </footer>

  <script>
    const burger = document.querySelector('.burger');
    const menu = document.querySelector('.menu');
    burger.addEventListener('click', () => {
      menu.classList.toggle('show');
    });
  </script>
</body>
</html>
