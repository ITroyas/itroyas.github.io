---
layout: default
---

<article class="post-content">
  {% if page.image %}
    <img class="post-image" src="{{ page.image }}" alt="{{ page.title }}">
  {% endif %}
  
  <h1># {{ page.title }}</h1>
  <time>Опубликовано {{ page.date | date: "%d %b %Y" }}</time>
  <div class="post-body">
    {{ content }}
  </div>
</article>
